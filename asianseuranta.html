<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Seuranta" />
  <link rel="apple-touch-icon" href="icon.png" />
  <title>Päivittäinen seuranta</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0c29 0%, #1a1a2e 50%, #16213e 100%);
      font-family: Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 32px;
      color: #e8e0d0;
    }
    .header { text-align: center; margin-bottom: 24px; }
    .header-label { font-size: 11px; letter-spacing: 5px; text-transform: uppercase; color: #a09880; margin-bottom: 8px; }
    .clock { font-size: 48px; font-weight: bold; letter-spacing: -1px; line-height: 1; }
    .date { font-size: 15px; color: #a09880; margin-top: 6px; text-transform: capitalize; }
    .status-banner {
      border-radius: 14px; padding: 10px 24px; font-size: 14px;
      letter-spacing: 0.5px; margin-bottom: 24px; transition: all 0.4s; text-align: center;
    }
    .status-all  { background: rgba(74,222,128,0.12); border: 1px solid rgba(74,222,128,0.3);  color: #86efac; }
    .status-none { background: rgba(251,113,133,0.10); border: 1px solid rgba(251,113,133,0.25); color: #fca5a5; }
    .status-part { background: rgba(251,191,36,0.10);  border: 1px solid rgba(251,191,36,0.25);  color: #fde68a; }
    .sections { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 20px; margin-bottom: 32px; }
    .section {
      background: rgba(255,255,255,0.04);
      border: 1.5px solid rgba(255,255,255,0.10);
      border-radius: 20px; padding: 20px 18px;
    }
    .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .section-icon { font-size: 24px; }
    .section-title { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #a09880; flex: 1; }
    .section-progress { font-size: 12px; color: #6b6358; }
    .section-progress.done { color: #86efac; }
    .task-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .task-row {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px; padding: 10px 12px; transition: all 0.2s;
    }
    .task-row.done { background: rgba(74,222,128,0.06); border-color: rgba(74,222,128,0.2); }
    .task-check {
      width: 22px; height: 22px; border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.2); background: transparent;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 12px; color: #86efac; flex-shrink: 0; transition: all 0.2s;
    }
    .task-check.checked { background: rgba(74,222,128,0.2); border-color: rgba(74,222,128,0.5); }
    .task-name { flex: 1; font-size: 14px; color: #e8e0d0; }
    .task-row.done .task-name { color: #86efac; }
    .task-time { font-size: 12px; color: #6b6358; }
    .task-row.done .task-time { color: #86efac; }
    .task-delete {
      background: transparent; border: none; color: #4a4540;
      font-size: 18px; cursor: pointer; padding: 2px 4px; line-height: 1; transition: color 0.2s;
    }
    .task-delete:active { color: #fca5a5; }
    .add-task { display: flex; gap: 8px; align-items: center; }
    .add-input {
      flex: 1; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px; color: #e8e0d0; font-family: Georgia, serif;
      font-size: 13px; padding: 8px 12px; outline: none;
    }
    .add-input::placeholder { color: #4a4540; }
    .add-input:focus { border-color: rgba(255,255,255,0.25); }
    .add-btn {
      background: rgba(255,255,255,0.08); border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 10px; color: #e8e0d0; font-size: 20px;
      width: 36px; height: 36px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s;
    }
    .add-btn:active { background: rgba(255,255,255,0.15); }
    .empty-tasks { font-size: 13px; color: #4a4540; text-align: center; padding: 8px 0; font-style: italic; }
    .history-section { width: 100%; max-width: 480px; }
    .history-title { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: #6b6358; margin-bottom: 12px; text-align: center; }
    .history-list { display: flex; flex-direction: column; gap: 7px; }
    .history-row { border-radius: 12px; padding: 10px 14px; }
    .row-today   { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); }
    .row-default { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
    .history-row-header { display: flex; align-items: center; margin-bottom: 6px; }
    .history-date { font-size: 13px; flex: 1; }
    .row-today .history-date { color: #e8e0d0; }
    .row-default .history-date { color: #a09880; }
    .history-summary { font-size: 12px; color: #6b6358; }
    .history-summary.all { color: #86efac; }
    .history-summary.part { color: #fde68a; }
    .history-tasks { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
    .h-pill { display: flex; align-items: center; gap: 4px; border-radius: 20px; padding: 2px 8px; font-size: 11px; }
    .h-pill.done    { background: rgba(74,222,128,0.10); border: 1px solid rgba(74,222,128,0.2); color: #86efac; }
    .h-pill.missing { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); color: #4a4540; }
    .footer { font-size: 11px; color: #3d3830; margin-top: 28px; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-label">Päivittäinen seuranta</div>
    <div class="clock" id="clock">00:00</div>
    <div class="date" id="date"></div>
  </div>
  <div class="status-banner" id="status"></div>
  <div class="sections">
    <div class="section">
      <div class="section-header">
        <div class="section-icon">☀️</div>
        <div class="section-title">Aamu</div>
        <div class="section-progress" id="progress-aamu"></div>
      </div>
      <div class="task-list" id="tasks-aamu"></div>
      <div class="add-task">
        <input class="add-input" id="input-aamu" type="text" placeholder="Lisää tehtävä..." maxlength="40" />
        <button class="add-btn" onclick="addTask('aamu')">+</button>
      </div>
    </div>
    <div class="section">
      <div class="section-header">
        <div class="section-icon">🌙</div>
        <div class="section-title">Ilta</div>
        <div class="section-progress" id="progress-ilta"></div>
      </div>
      <div class="task-list" id="tasks-ilta"></div>
      <div class="add-task">
        <input class="add-input" id="input-ilta" type="text" placeholder="Lisää tehtävä..." maxlength="40" />
        <button class="add-btn" onclick="addTask('ilta')">+</button>
      </div>
    </div>
  </div>
  <div class="history-section">
    <div class="history-title">7 päivän historia</div>
    <div class="history-list" id="history-list"></div>
  </div>
  <div class="footer">Tiedot tallennetaan tähän laitteeseen</div>
  <script>
    const TASKS_KEY   = "seuranta_tasks";
    const HISTORY_KEY = "seuranta_history";
    function getTodayKey() { return new Date().toISOString().split("T")[0]; }
    function nowTime() { return new Date().toLocaleTimeString("fi-FI", { hour: "2-digit", minute: "2-digit" }); }
    function formatDate(dateStr) {
      const d = new Date(dateStr + "T12:00:00");
      return d.toLocaleDateString("fi-FI", { weekday: "short", day: "numeric", month: "numeric" });
    }
    function escHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }
    function loadTasks() {
      try { return JSON.parse(localStorage.getItem(TASKS_KEY) || '{"aamu":[],"ilta":[]}'); }
      catch { return { aamu: [], ilta: [] }; }
    }
    function saveTasks(t) { localStorage.setItem(TASKS_KEY, JSON.stringify(t)); }
    function loadHistory() {
      try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || "{}"); }
      catch { return {}; }
    }
    function saveHistory(h) { localStorage.setItem(HISTORY_KEY, JSON.stringify(h)); }
    function getUid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,5); }
    function addTask(period) {
      const input = document.getElementById("input-" + period);
      const name = input.value.trim();
      if (!name) return;
      const tasks = loadTasks();
      tasks[period].push({ id: getUid(), name });
      saveTasks(tasks);
      input.value = "";
      render();
    }
    function deleteTask(period, taskId) {
      const tasks = loadTasks();
      tasks[period] = tasks[period].filter(t => t.id !== taskId);
      saveTasks(tasks);
      const history = loadHistory();
      const today = getTodayKey();
      if (history[today] && history[today][period]) {
        delete history[today][period][taskId];
        saveHistory(history);
      }
      render();
    }
    function toggleTask(period, taskId) {
      const history = loadHistory();
      const today = getTodayKey();
      if (!history[today]) history[today] = {};
      if (!history[today][period]) history[today][period] = {};
      history[today][period][taskId] = history[today][period][taskId] ? null : nowTime();
      saveHistory(history);
      render();
    }
    function renderSection(period, tasks, history) {
      const today = getTodayKey();
      const todayEntry = (history[today] && history[today][period]) || {};
      const list = document.getElementById("tasks-" + period);
      const progress = document.getElementById("progress-" + period);
      const total = tasks.length;
      const done = tasks.filter(t => todayEntry[t.id]).length;
      if (total === 0) {
        progress.textContent = "";
        list.innerHTML = `<div class="empty-tasks">Ei tehtäviä — lisää alla</div>`;
        return;
      }
      progress.textContent = done + "/" + total;
      progress.className = "section-progress" + (done === total ? " done" : "");
      list.innerHTML = tasks.map(task => {
        const takenTime = todayEntry[task.id];
        const isDone = !!takenTime;
        return `<div class="task-row ${isDone ? "done" : ""}">
          <button class="task-check ${isDone ? "checked" : ""}" onclick="toggleTask('${period}','${task.id}')">${isDone ? "✓" : ""}</button>
          <div class="task-name">${escHtml(task.name)}</div>
          <div class="task-time">${takenTime || ""}</div>
          <button class="task-delete" onclick="deleteTask('${period}','${task.id}')">×</button>
        </div>`;
      }).join("");
    }
    function renderStatus(tasks, history) {
      const today = getTodayKey();
      const todayEntry = history[today] || {};
      let total = 0, done = 0;
      ["aamu","ilta"].forEach(p => {
        tasks[p].forEach(t => { total++; if (todayEntry[p] && todayEntry[p][t.id]) done++; });
      });
      const el = document.getElementById("status");
      if (total === 0) {
        el.className = "status-banner status-none";
        el.textContent = "Lisää tehtäviä aamuun tai iltaan";
      } else if (done === total) {
        el.className = "status-banner status-all";
        el.textContent = "✓ Kaikki tehty tänään — hyvää työtä!";
      } else if (done === 0) {
        el.className = "status-banner status-none";
        el.textContent = "Ei vielä merkintöjä tänään";
      } else {
        el.className = "status-banner status-part";
        el.textContent = done + "/" + total + " tehty tänään";
      }
    }
    function renderHistory(tasks, history) {
      const today = getTodayKey();
      const days = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(); d.setDate(d.getDate() - i);
        return d.toISOString().split("T")[0];
      }).reverse();
      document.getElementById("history-list").innerHTML = days.map(day => {
        const isToday = day === today;
        const entry = history[day] || {};
        let total = 0, done = 0;
        const pills = [];
        ["aamu","ilta"].forEach(p => {
          tasks[p].forEach(t => {
            total++;
            const time = entry[p] && entry[p][t.id];
            if (time) done++;
            pills.push({ name: t.name, time, period: p });
          });
        });
        const summaryClass = "history-summary" + (done === total && total > 0 ? " all" : done > 0 ? " part" : "");
        const summaryText = total === 0 ? "" : done + "/" + total + " tehty";
        const pillsHtml = pills.map(p =>
          `<div class="h-pill ${p.time ? "done" : "missing"}">${p.period === "aamu" ? "☀️" : "🌙"} ${escHtml(p.name)}${p.time ? " " + p.time : ""}</div>`
        ).join("");
        return `<div class="history-row ${isToday ? "row-today" : "row-default"}">
          <div class="history-row-header">
            <div class="history-date">${isToday ? "Tänään" : formatDate(day)}</div>
            <div class="${summaryClass}">${summaryText}</div>
          </div>
          ${pills.length > 0 ? `<div class="history-tasks">${pillsHtml}</div>` : ""}
        </div>`;
      }).join("");
    }
    function updateClock() {
      const now = new Date();
      document.getElementById("clock").textContent = now.toLocaleTimeString("fi-FI", { hour: "2-digit", minute: "2-digit" });
      document.getElementById("date").textContent = now.toLocaleDateString("fi-FI", { weekday: "long", day: "numeric", month: "long" });
    }
    function render() {
      const tasks = loadTasks();
      const history = loadHistory();
      renderSection("aamu", tasks.aamu, history);
      renderSection("ilta", tasks.ilta, history);
      renderStatus(tasks, history);
      renderHistory(tasks, history);
    }
    document.getElementById("input-aamu").addEventListener("keydown", e => { if (e.key === "Enter") addTask("aamu"); });
    document.getElementById("input-ilta").addEventListener("keydown", e => { if (e.key === "Enter") addTask("ilta"); });
    updateClock();
    render();
    setInterval(updateClock, 60000);
  </script>
</body>
</html>
